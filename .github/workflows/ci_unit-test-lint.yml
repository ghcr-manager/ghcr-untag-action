name: "CI: Unit-test, lint"

"on":
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-test-lint:
    name: Run tests and linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@4e1c61a887e7436260aa789e38bf0a87460be5d3 # v2.5.6
        with:
          include-first-party: "true"
          exclude-workflows: ".github/workflows/test_live-untag.yml"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linters
        run: npm run lint

      - name: Check links in markdown
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
        with:
          use-verbose-mode: true
