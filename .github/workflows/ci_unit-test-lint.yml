name: "CI: Unit-test, lint"

"on":
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-test-lint:
    name: Run tests and linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9467f3db8f5f3c942629468981c4a2a67d0caa64 # v2.6.1
        with:
          include-first-party: "true"
          write-job-summary: "on-failure-only"
          exclude-workflows: ".github/workflows/test_live-untag.yml"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linters
        run: npm run lint

      - name: Check links in markdown
        uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1.1.2
        with:
          use-verbose-mode: true
